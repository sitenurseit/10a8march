<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10A қыздарына</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#fff7b0,#ffe066,#ffd54f);
overflow-x:hidden;
}

/* негізгі карточка */

.card{
background:rgba(255,255,240,0.95);
max-width:750px;
margin:80px auto;
padding:45px;
border-radius:25px;

border:5px solid #ffc107;
box-shadow:
0 0 20px rgba(255,193,7,0.6),
0 20px 40px rgba(0,0,0,0.2);

text-align:center;
position:relative;
z-index:2;
}

h1{
font-size:42px;
color:#b8860b;
}

h2{
color:#d4a017;
}

p{
font-size:19px;
line-height:1.8;
color:#6b4f00;
}

/* батырма */

button{
background:#ffc107;
color:#5a3e00;
border:none;
padding:16px 40px;
font-size:18px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
margin-top:20px;
}

button:hover{
background:#ffca28;
transform:scale(1.1);
}

/* фон анимация */

.heart,.flower,.sparkle{
position:fixed;
top:-10vh;
pointer-events:none;
z-index:0;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

@keyframes sparkleAnim{
0%{opacity:0;transform:scale(0);}
50%{opacity:1;}
100%{opacity:0;transform:scale(0);}
}

</style>
</head>

<body>

<div class="card">

<h1>🌼 10 "A" сынып қыздарына 🌼</h1>

<h2>8 Наурыз мерекесі құтты болсын!</h2>

<p>
Құрметті 10 "A" сыныбының ару қыздары!  
Сіздерді көктемнің ең әдемі және ең нәзік мерекесімен шын жүректен құттықтаймыз!
</p>

<button onclick="window.location.href='congrats.html'">
Құттықтауды ашу
</button>

</div>

<script>

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💛";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+15+"px";
heart.style.animation=`fall ${Math.random()*3+4}s linear`;
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}

function createFlower(){
const flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌼";
flower.style.left=Math.random()*100+"vw";
flower.style.fontSize=Math.random()*20+20+"px";
flower.style.animation=`fall ${Math.random()*4+5}s linear`;
document.body.appendChild(flower);
setTimeout(()=>flower.remove(),7000);
}

function createSparkle(){
const s=document.createElement("div");
s.className="sparkle";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
s.style.fontSize=Math.random()*15+10+"px";
s.style.animation=`sparkleAnim ${Math.random()*2+2}s linear`;
document.body.appendChild(s);
setTimeout(()=>s.remove(),3000);
}

setInterval(createHeart,400);
setInterval(createFlower,900);
setInterval(createSparkle,800);

</script>

</body>
</html>
