<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>10A қыздарына шақыру</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;

background:linear-gradient(135deg,#fff9c4,#ffe082,#ffd54f);

overflow-x:hidden;
}

/* негізгі шақыру карточкасы */

.card{

max-width:750px;

margin:90px auto;

padding:60px;

background:#fffdf2;

border-radius:25px;

/* алтын рамка */

border:8px double #d4af37;

box-shadow:
0 0 25px rgba(212,175,55,0.6),
0 20px 50px rgba(0,0,0,0.25);

text-align:center;

position:relative;

animation:fade 2s ease;

}

/* бұрыштағы гүлдер */

.card:before{
content:"🌼";
position:absolute;
top:-30px;
left:-30px;
font-size:70px;
}

.card:after{
content:"🌼";
position:absolute;
bottom:-30px;
right:-30px;
font-size:70px;
}

/* текст */

h1{
font-size:42px;
color:#b8860b;
}

h2{
color:#c79a00;
}

p{
font-size:19px;
line-height:1.8;
color:#6b4f00;
}

/* кнопка */

button{

background:linear-gradient(45deg,#ffd54f,#ffca28);

border:none;

padding:18px 45px;

font-size:18px;

border-radius:12px;

cursor:pointer;

color:#5a3e00;

margin-top:25px;

box-shadow:0 5px 15px rgba(0,0,0,0.2);

transition:0.3s;

}

button:hover{

transform:scale(1.1);

background:#ffe082;

}

/* фон анимация */

.heart,.flower,.sparkle{

position:fixed;

top:-10vh;

pointer-events:none;

z-index:0;

}

@keyframes fall{

to{transform:translateY(110vh);}

}

@keyframes sparkleAnim{

0%{opacity:0;transform:scale(0);}

50%{opacity:1;}

100%{opacity:0;transform:scale(0);}

}

@keyframes fade{

from{opacity:0;transform:translateY(40px);}

to{opacity:1;}

}

</style>

</head>

<body>

<div class="card">

<h1>🌼 10 "A" сынып қыздарына 🌼</h1>

<h2>8 Наурыз мерекесі құтты болсын!</h2>

<p>

Құрметті 10 "A" сыныбының ару қыздары!  
Сіздерді көктемнің ең әдемі және ең нәзік мерекесімен  
шын жүректен құттықтаймыз.

</p>

<button onclick="window.location.href='congrats.html'">

Құттықтауды ашу

</button>

</div>

<script>

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💛";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=Math.random()*20+15+"px";

heart.style.animation=`fall ${Math.random()*3+4}s linear`;

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

function createFlower(){

const flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌼";

flower.style.left=Math.random()*100+"vw";

flower.style.fontSize=Math.random()*20+20+"px";

flower.style.animation=`fall ${Math.random()*4+5}s linear`;

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),7000);

}

function createSparkle(){

const s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";

s.style.fontSize=Math.random()*15+10+"px";

s.style.animation=`sparkleAnim ${Math.random()*2+2}s linear`;

document.body.appendChild(s);

setTimeout(()=>s.remove(),3000);

}

setInterval(createHeart,400);
setInterval(createFlower,900);
setInterval(createSparkle,800);

</script>

</body>
</html>
