<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10A қыздарына 8 Наурыз</title>
<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
overflow-x:hidden;
position:relative;
}
.card{
background:rgba(255,255,255,0.95);
max-width:750px;
margin:70px auto;
padding:45px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
position:relative;
z-index:1;
}
h1{font-size:40px;color:#e91e63;}
h2{color:#ff4081;}
p{font-size:19px;line-height:1.8;color:#444;}
button{
background:#e91e63;color:white;border:none;
padding:16px 40px;font-size:18px;border-radius:12px;cursor:pointer;
transition:0.3s;margin-top:10px;
}
button:hover{background:#c2185b;transform:scale(1.1);}
.heart,.flower,.sparkle{
position:fixed;top:-10vh;pointer-events:none;z-index:0;
}
@keyframes fall{to{transform:translateY(110vh);}}
@keyframes sparkleAnim{0%{opacity:0; transform:translateY(0) scale(0);}50%{opacity:1; transform:translateY(50px) scale(1);}100%{opacity:0; transform:translateY(100px) scale(0);}}
</style>
</head>
<body>
<div class="card">
<h1>🌸 10 "A" сынып қыздарына 🌸</h1>
<h2>8 Наурыз мерекесі құтты болсын!</h2>
<p>Құрметті 10 "A" сыныбының ару қыздары! Сіздерді көктемнің ең нәзік, ең әдемі және ең жарқын мерекесі – 8 Наурыз мейрамымен шын жүректен құттықтаймыз!</p>
<button id="openBtn">Құттықтауды ашу</button>
</div>

<script>
// Фон анимациялары
function createHeart(){const heart=document.createElement("div");heart.className="heart";heart.innerHTML="💖";heart.style.left=Math.random()*100+"vw";heart.style.fontSize=Math.random()*20+15+"px";heart.style.animation=`fall ${Math.random()*3+4}s linear`;document.body.appendChild(heart);setTimeout(()=>heart.remove(),6000);}
function createFlower(){const flower=document.createElement("div");flower.className="flower";flower.innerHTML="🌸";flower.style.left=Math.random()*100+"vw";flower.style.fontSize=Math.random()*20+20+"px";flower.style.animation=`fall ${Math.random()*4+5}s linear`;document.body.appendChild(flower);setTimeout(()=>flower.remove(),7000);}
function createSparkle(){const s=document.createElement("div");s.className="sparkle";s.innerHTML="✨";s.style.left=Math.random()*100+"vw";s.style.fontSize=Math.random()*15+10+"px";s.style.animation=`sparkleAnim ${Math.random()*2+2}s linear`;document.body.appendChild(s);setTimeout(()=>s.remove(),3000);}
setInterval(createHeart,400);
setInterval(createFlower,900);
setInterval(createSparkle,800);

// Құттықтауды ашу батырмасы
document.getElementById("openBtn").addEventListener("click", function(){
  window.location.href = "congrats.html";
});
</script>
</body>
</html>
