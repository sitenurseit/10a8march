<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>10A қыздарына шақыру</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#fff9c4,#ffe082,#ffd54f);
overflow:hidden;
}

/* карточка */

.card{

max-width:750px;
margin:90px auto;
padding:60px;

background:#fffdf2;

border-radius:25px;

border:8px double #d4af37;

box-shadow:
0 0 25px rgba(212,175,55,0.6),
0 20px 50px rgba(0,0,0,0.25);

text-align:center;

animation:fade 2s ease;

position:relative;

}

/* гүлдер */

.card:before{
content:"🌼";
position:absolute;
top:-30px;
left:-30px;
font-size:70px;
}

.card:after{
content:"🌼";
position:absolute;
bottom:-30px;
right:-30px;
font-size:70px;
}

h1{
font-size:42px;
color:#b8860b;
}

h2{
color:#c79a00;
}

p{
font-size:19px;
color:#6b4f00;
line-height:1.8;
}

button{

background:linear-gradient(45deg,#ffd54f,#ffca28);
border:none;
padding:18px 45px;
font-size:18px;
border-radius:12px;
cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,0.2);

transition:0.3s;

}

button:hover{
transform:scale(1.1);
background:#ffe082;
}

@keyframes fade{

from{opacity:0;transform:translateY(40px);}
to{opacity:1;}

}

/* фон анимация */

.heart{
position:fixed;
top:-10vh;
pointer-events:none;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="card">

<h1>🌼 10 "A" сынып қыздарына 🌼</h1>

<h2>8 Наурыз мерекесі құтты болсын!</h2>

<p>

Құрметті 10 "A" сыныбының ару қыздары!  
Сіздерді көктемнің ең әдемі және нәзік мерекесімен  
шын жүректен құттықтаймыз!

</p>

<button onclick="window.location.href='congrats.html'">

Құттықтауды ашу

</button>

</div>

<script>

function createHeart(){

const heart=document.createElement("div");
heart.className="heart";

heart.innerHTML="💛";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+15+"px";

heart.style.animation=`fall ${Math.random()*3+4}s linear`;

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
